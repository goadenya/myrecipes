<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smakfullt – Receptblogg</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --cream:#faf7f2;--dark:#1a1510;--mid:#5c4a32;--accent:#c8783a;--light:#e8ddd0;
    --card-bg:#ffffff;
  }
  body{background:var(--cream);font-family:'Lato',sans-serif;color:var(--dark);min-height:100vh}
  h1,h2,h3,h4{font-family:'Playfair Display',serif}

  .blog-header{
    background:var(--dark);color:var(--cream);
    padding:2.5rem 2rem 2rem;text-align:center;border-bottom:3px solid var(--accent)
  }
  .blog-header h1{font-size:2.4rem;letter-spacing:0.02em;margin-bottom:0.3rem}
  .blog-header p{font-size:0.95rem;color:#b8a898;font-weight:300;letter-spacing:0.08em;text-transform:uppercase}

  .nav{display:flex;justify-content:center;gap:2rem;padding:1rem 2rem;background:var(--dark);border-bottom:1px solid #333}
  .nav a{color:#b8a898;font-size:0.8rem;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;text-decoration:none;transition:color 0.2s}
  .nav a:hover,.nav a.active{color:var(--accent)}

  .main{max-width:900px;margin:0 auto;padding:2rem 1.5rem}

  .recipe-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1.5rem}
  .recipe-card{background:var(--card-bg);border-radius:4px;overflow:hidden;cursor:pointer;
    border:1px solid var(--light);transition:transform 0.2s,box-shadow 0.2s}
  .recipe-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,0.12)}
  .card-img-placeholder{width:100%;height:200px;display:flex;align-items:center;justify-content:center;
    font-size:2.5rem;background:linear-gradient(135deg,#e8ddd0,#d4c4b0)}
  .card-body{padding:1.2rem}
  .card-tag{font-size:0.7rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--accent);font-weight:700;margin-bottom:0.4rem}
  .card-title{font-size:1.2rem;color:var(--dark);margin-bottom:0.5rem;line-height:1.3}
  .card-meta{font-size:0.8rem;color:#8a7a6a;display:flex;gap:1rem}

  .recipe-detail{display:none}
  .back-btn{display:inline-flex;align-items:center;gap:0.4rem;color:var(--mid);font-size:0.85rem;
    cursor:pointer;margin-bottom:1.5rem;background:none;border:none;font-family:'Lato',sans-serif;padding:0}
  .back-btn:hover{color:var(--accent)}

  .recipe-hero-placeholder{width:100%;height:360px;border-radius:4px;display:flex;align-items:center;justify-content:center;
    font-size:5rem;background:linear-gradient(135deg,#e8ddd0,#d4c4b0);margin-bottom:2rem}

  .recipe-header{margin-bottom:2rem}
  .recipe-category{font-size:0.75rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--accent);font-weight:700;margin-bottom:0.5rem}
  .recipe-title{font-size:2rem;margin-bottom:0.8rem;line-height:1.2}
  .recipe-desc{color:#6a5a4a;font-size:1rem;line-height:1.7;font-weight:300;margin-bottom:1.2rem}
  .recipe-meta-bar{display:flex;gap:2rem;padding:1rem 0;border-top:1px solid var(--light);border-bottom:1px solid var(--light)}
  .meta-item{text-align:center}
  .meta-label{font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#8a7a6a;display:block;margin-bottom:0.2rem}
  .meta-value{font-size:1rem;font-weight:700;color:var(--dark)}

  .two-col{display:grid;grid-template-columns:1fr 1.6fr;gap:2.5rem;margin-top:2rem}
  @media(max-width:600px){.two-col{grid-template-columns:1fr}}

  .section-title{font-size:1rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent);
    margin-bottom:1.2rem;padding-bottom:0.5rem;border-bottom:2px solid var(--accent)}

  .ingredients-list{list-style:none}
  .ingredients-list li{padding:0.55rem 0;border-bottom:1px solid var(--light);font-size:0.95rem;color:var(--dark);
    display:flex;justify-content:space-between}
  .ing-name{color:var(--mid)}
  .ing-amount{font-weight:700;color:var(--dark)}

  .steps-list{list-style:none}
  .step-item{margin-bottom:2rem}
  .step-num{font-family:'Playfair Display',serif;font-size:2rem;color:var(--light);font-weight:700;line-height:1;margin-bottom:0.3rem}
  .step-text{font-size:0.95rem;color:#4a3a2a;line-height:1.75;font-weight:300;margin-bottom:0.8rem}
  .step-img{width:100%;border-radius:4px;overflow:hidden;background:#e8ddd0}
  .step-img-placeholder{width:100%;height:160px;display:flex;align-items:center;justify-content:center;
    font-size:2rem;background:linear-gradient(135deg,#ede5da,#d8ccbf);border-radius:4px}
  .step-img img{width:100%;height:160px;object-fit:cover;display:block;cursor:pointer}
  .step-img-caption{font-size:0.75rem;color:#8a7a6a;padding:0.4rem 0.6rem;font-style:italic}

  .image-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:none;align-items:center;justify-content:center;z-index:1000;padding:1.5rem}
  .image-modal.open{display:flex}
  .image-modal-content{max-width:95%;max-height:95%;position:relative;display:flex;flex-direction:column;align-items:center}
  .image-modal-content img{max-width:90vw;max-height:75vh;width:auto;height:auto;border-radius:8px;box-shadow:0 20px 60px rgba(0,0,0,0.35)}
  .image-modal-close{position:absolute;top:-0.75rem;right:-0.75rem;width:2.2rem;height:2.2rem;border-radius:50%;border:none;background:rgba(255,255,255,0.95);color:#1a1510;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 20px rgba(0,0,0,0.15)}
  .image-modal-caption{margin-top:0.8rem;color:#fff;font-size:0.95rem;text-align:center;max-width:95%;}

  .loading-img{width:100%;height:160px;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:#f0ebe4;border-radius:4px;gap:0.5rem}
  .loading-img span{font-size:0.75rem;color:#8a7a6a}
  .spinner{width:20px;height:20px;border:2px solid #d4c4b0;border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  .hero-loading{width:100%;height:360px;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:#f0ebe4;border-radius:4px;gap:1rem;margin-bottom:2rem}
  .hero-loading .spinner{width:32px;height:32px;border-width:3px}
  .hero-loading span{font-size:0.9rem;color:#8a7a6a}

  .card-loading{width:100%;height:200px;display:flex;align-items:center;justify-content:center;background:#f0ebe4;gap:0.5rem}
</style>
</head>
<body>

<div class="blog-header">
  <h1>Smakfullt</h1>
  <p>Recept med kärlek &amp; hantverk</p>
</div>
<div class="nav">
  <a class="active" onclick="showHome()">Hem</a>
  <a onclick="filterRecipes('Förrätt')">Förrätter</a>
  <a onclick="filterRecipes('Varmrätt')">Varmrätter</a>
  <a onclick="filterRecipes('Dessert')">Desserter</a>
</div>

<div class="main">
  <div id="home-view">
    <div class="recipe-grid" id="recipe-grid"></div>
  </div>
  <div id="detail-view" class="recipe-detail"></div>
</div>
<div class="image-modal" id="image-modal" onclick="closeImageModal(event)">
  <div class="image-modal-content" id="image-modal-content">
    <button class="image-modal-close" aria-label="Stäng bild">×</button>
    <img id="image-modal-img" src="" alt="" />
    <div class="image-modal-caption" id="image-modal-caption"></div>
  </div>
</div>

<script>
const RECIPES = [
  {
    id:1, category:"Varmrätt", emoji:"🐖",
    title:"Carnitas",
    desc:"Långkokta, citrusdoftande carnitas med kryddor och krispiga kanter. Servera i majstortilla med salsa verde, silverlök och koriander.",
    time:"4–5 h", servings:"6-8", difficulty:"Medel",
    heroImage:"assets/img/finished_carnitas.JPG",
    heroPrompt:"slow cooked carnitas with crispy edges in tortillas, fresh cilantro, lime, Mexican street food, vibrant food photography",
    ingredients:[
      {name:"Fläskbog eller fläskkarre",amount:"1 - 1.5 kg"},
      {name:"Spiskummin",amount:"1 msk"},
      {name:"Rökt paprika",amount:"1 msk"},
      {name:"Oregano",amount:"1 msk"},
      {name:"Chilipulver",amount:"1 msk"},
      {name:"Brunt socker",amount:"1 msk"},
      {name:"Vitlökspulver",amount:"1 msk"},
      {name:"Salt",amount:"efter smak"},
      {name:"Svartpeppar",amount:"efter smak"},
      {name:"Stekfett från bacon",amount:"till stekning"},
      {name:"Margarin",amount:"100 g"},
      {name:"Kanelstång",amount:"1 st"},
      {name:"Lagerblad",amount:"3 st"},
      {name:"Hela chilifrukter",amount:"1-2 st (starka)"},
      {name:"Vitlöksklyftor",amount:"3 st"},
      {name:"Apelsiner",amount:"2 st"},
      {name:"Gullökar",amount:"2 st"},
      {name:"Lime",amount:"1 st"},
      {name:"Coca-Cola (vanlig)",amount:"1 liter"},
      {name:"Stir in Spice paste - Smoky Chipotle",amount:"1 paket"},
      {name:"Chipotle paste",amount:"1 burk"},
      {name:"Liquid smoke",amount:"valfritt, några skvättar"}
    ],
    steps:[
      {text:"Skär upp köttet i stora bitar och krydda det med spiskummin, rökt paprika, oregano, brunt socker, chilipulver, vitlökspulver, salt och peppar. Massera in kryddorna ordentligt.",
       image:"assets/img/ingredients.jpg"},
      {text:"Dela gullökarna i fyra delar och skär apelsinerna och limen på mitten. Hacka vitlöken grovt."},
      {text:"Lägg bacon i en kall kastrull och värm långsamt på låg värme tills fettet renderats ut. Ta upp baconet när det är krispigt och lämna fettet i kastrullen.",
       image:"assets/img/fried_bacon.jpg"},
      {text:"Höj till medel-hög värme och smält margarinet i det värmande baconfettet. Bryn köttbitarna på alla sidor i omgångar så att de får fin färg utan att bli genomstekta.",},
      {text:"Lägg tillbaka allt kött i kastrullen tillsammans med lök, vitlök, chilifrukter, lagerblad och kanelstång. Häll i Coca-Cola och pressa ut saften ur apelsinerna och limen. Tillsätt även skal, spice paste, chipotle paste och eventuellt liquid smoke.",
       image:"assets/img/liquid_smoke_bottle.jpg"},
      {text:"Koka på medel-låg värme i minst 4 timmar. Rör om var 45:e minut och tillsätt vatten efter hand så att vätskenivån håller sig jämn under hela koktiden.",
       image:"assets/img/carnitas_cooking_on_stove.jpg"},
      {text:"Köttet är klart när det enkelt går att dra isär med en gaffel. Ta bort kanelstång, apelsin- och limeskal. Dra sedan isär köttet och stek det lätt i lite av såsen så det får krispiga kanter.",
       image:"assets/img/finished_carnitas.JPG"}
    ]
  }
];

function getImageAltText(imagePath, fallback) {
  if (!imagePath) return fallback;
  const filename = imagePath.split('/').pop().split('.')[0].toLowerCase();
  const altTexts = {
    'ingredients': 'Ingredienser för carnitas - kryddor, kött och grönsaker',
    'fried_bacon': 'Stekt bacon som renderar fett för stekning av kött',
    'carnitas_cooking_on_stove': 'Carnitas som bryns och kokar i kastrull på spisen',
    'liquid_smoke_bottle': 'Flaska med liquid smoke krydda för extra rökig smak',
    'finished_carnitas': 'Färdiga carnitas med krispiga kanter, redo att serveras'
  };
  return altTexts[filename] || fallback;
}

function renderRecipeCards(recipes) {
  const grid = document.getElementById('recipe-grid');
  grid.innerHTML = '';
  recipes.forEach(r => {
    const card = document.createElement('div');
    card.className = 'recipe-card';
    card.innerHTML = `
      <div class="card-loading" id="card-img-${r.id}">
        <div class="spinner"></div>
      </div>
      <div class="card-body">
        <div class="card-tag">${r.category}</div>
        <h3 class="card-title">${r.title}</h3>
        <div class="card-meta">
          <span>⏱ ${r.time}</span>
          <span>👤 ${r.servings} pers</span>
          <span>${r.difficulty}</span>
        </div>
      </div>`;
    card.addEventListener('click', ()=>openRecipe(r.id));
    grid.appendChild(card);
    loadCardImage(r);
  });
}

function loadCardImage(r) {
  const container = document.getElementById(`card-img-${r.id}`);
  if (!container) return;
  const img = new Image();
  const url = r.heroImage ? r.heroImage : getUnsplashUrl(r.heroPrompt, 600, 400);
  img.onload = () => {
    container.className = '';
    container.style.cssText = 'width:100%;height:200px;overflow:hidden';
    img.style.cssText = 'width:100%;height:200px;object-fit:cover;display:block';
    container.innerHTML = '';
    container.appendChild(img);
  };
  img.onerror = () => {
    container.className = 'card-img-placeholder';
    container.textContent = r.emoji;
  };
  img.src = url;
  img.alt = getImageAltText(r.heroImage, r.title);
}

function openRecipe(id) {
  const r = RECIPES.find(x=>x.id===id);
  if (!r) return;
  document.getElementById('home-view').style.display = 'none';
  const detail = document.getElementById('detail-view');
  detail.style.display = 'block';

  const stepsHtml = r.steps.map((s,i)=>{
    const imageBlock = s.image || s.imgPrompt ? `
      <div class="step-img" id="step-img-${r.id}-${i}">
        <div class="loading-img"><div class="spinner"></div><span>Laddar bild...</span></div>
      </div>` : '';

    return `
      <li class="step-item">
        <div class="step-num">0${i+1}</div>
        <p class="step-text">${s.text}</p>${imageBlock}
      </li>`;
  }).join('');

  const ingsHtml = r.ingredients.map(ing=>`
    <li><span class="ing-name">${ing.name}</span><span class="ing-amount">${ing.amount}</span></li>`).join('');

  detail.innerHTML = `
    <button class="back-btn" onclick="showHome()">← Tillbaka till alla recept</button>
    <div class="hero-loading" id="hero-container-${r.id}">
      <div class="spinner"></div><span>Laddar bild...</span>
    </div>
    <div class="recipe-header">
      <div class="recipe-category">${r.category}</div>
      <h1 class="recipe-title">${r.title}</h1>
      <p class="recipe-desc">${r.desc}</p>
      <div class="recipe-meta-bar">
        <div class="meta-item"><span class="meta-label">Tid</span><span class="meta-value">${r.time}</span></div>
        <div class="meta-item"><span class="meta-label">Portioner</span><span class="meta-value">${r.servings}</span></div>
        <div class="meta-item"><span class="meta-label">Svårighetsgrad</span><span class="meta-value">${r.difficulty}</span></div>
      </div>
    </div>
    <div class="two-col">
      <div>
        <div class="section-title">Ingredienser</div>
        <ul class="ingredients-list">${ingsHtml}</ul>
      </div>
      <div>
        <div class="section-title">Gör så här</div>
        <ol class="steps-list">${stepsHtml}</ol>
      </div>
    </div>`;

  window.scrollTo({top:0, behavior:'smooth'});
  loadHeroImage(r);
  r.steps.forEach((_,i) => loadStepImage(r, i));
}

function loadHeroImage(r) {
  const container = document.getElementById(`hero-container-${r.id}`);
  if (!container) return;
  const img = new Image();
  const url = r.heroImage ? r.heroImage : getUnsplashUrl(r.heroPrompt, 900, 600);
  img.onload = () => {
    container.className = '';
    img.style.cssText = 'width:100%;height:360px;object-fit:cover;border-radius:4px;display:block;margin-bottom:2rem;cursor:pointer';
    img.addEventListener('click', () => openImageModal(url, getImageAltText(r.heroImage, r.title)));
    container.parentNode.replaceChild(img, container);
  };
  img.onerror = () => {
    container.className = 'recipe-hero-placeholder';
    container.innerHTML = r.emoji;
  };
  img.src = url;
  img.alt = getImageAltText(r.heroImage, r.title);
}

function loadStepImage(r, i) {
  const step = r.steps[i];
  if (!step.image && !step.imgPrompt) return;
  const container = document.getElementById(`step-img-${r.id}-${i}`);
  if (!container) return;
  const img = new Image();
  const url = step.image ? step.image : getUnsplashUrl(step.imgPrompt || 'food', 600, 320);
  img.onload = () => {
    container.innerHTML = '';
    img.style.cssText = 'width:100%;height:160px;object-fit:cover;display:block;border-radius:4px;cursor:pointer';
    img.addEventListener('click', () => openImageModal(url, getImageAltText(step.image, `Steg ${i+1}`)));
    container.appendChild(img);
    const cap = document.createElement('div');
    cap.className = 'step-img-caption';
    cap.textContent = `Steg ${i+1}`;
    container.appendChild(cap);
  };
  img.onerror = () => {
    container.innerHTML = `<div class="step-img-placeholder">🍳</div>`;
  };
  img.src = url;
  img.alt = getImageAltText(step.image, `Steg ${i+1}`);
}

function openImageModal(src, caption) {
  const modal = document.getElementById('image-modal');
  const modalImg = document.getElementById('image-modal-img');
  const modalCaption = document.getElementById('image-modal-caption');
  modalImg.src = src;
  modalImg.alt = caption;
  modalCaption.textContent = caption;
  modal.classList.add('open');
}

function closeImageModal(event) {
  const modal = document.getElementById('image-modal');
  if (event.target.id === 'image-modal' || event.target.classList.contains('image-modal-close')) {
    modal.classList.remove('open');
  }
}

window.addEventListener('keydown', event => {
  if (event.key === 'Escape') {
    document.getElementById('image-modal').classList.remove('open');
  }
});

function showHome() {
  document.getElementById('home-view').style.display = 'block';
  document.getElementById('detail-view').style.display = 'none';
  document.getElementById('detail-view').innerHTML = '';
  document.querySelectorAll('.nav a').forEach((a,i)=>{ if(i===0) a.classList.add('active'); else a.classList.remove('active'); });
}

function filterRecipes(category) {
  document.getElementById('home-view').style.display = 'block';
  document.getElementById('detail-view').style.display = 'none';
  const filtered = RECIPES.filter(r=>r.category===category);
  renderRecipeCards(filtered.length ? filtered : RECIPES);
}

renderRecipeCards(RECIPES);
</script>
</body>
</html>
